[tool.uv.workspace]
members = ["ranker", "bench", "integrations/celery", "demo-server"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov",
    "fakeredis[lua]>=2.21",
    "httpx",
    "ruff>=0.4",
    "hypothesis>=6.100",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore:X does not have valid feature names:UserWarning",
]

[tool.ruff.lint.per-file-ignores]
"tests/bench/test_stub.py" = ["F401"]
"tests/celery/test_stub.py" = ["F401"]
